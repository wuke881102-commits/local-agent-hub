<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" role="img" aria-label="组织架构图谱 (虚构示例数据)">
  <defs>
    <style>
      .t{font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
      .mut{fill:#8A968F} .dk{fill:#0F2A1C} .sub{fill:#5B6B62} .grn{fill:#00AA4F}
      .card{fill:#fff;stroke:#E6EBE8;stroke-width:1.5}
      .lbl{font-weight:800;fill:#0F2A1C}
      .cnt{font-weight:800;fill:#fff;text-anchor:middle}
    </style>
  </defs>
  <rect x="6" y="6" width="1428" height="888" rx="16" fill="#fff" stroke="#DDE3DF" stroke-width="1.5"/>
  <rect x="6" y="6" width="1428" height="44" rx="16" fill="#F3F6F4"/><rect x="6" y="34" width="1428" height="16" fill="#F3F6F4"/>
  <g><circle cx="34" cy="28" r="6" fill="#FF5F57"/><circle cx="56" cy="28" r="6" fill="#FEBC2E"/><circle cx="78" cy="28" r="6" fill="#28C840"/></g>
  <rect x="520" y="17" width="400" height="24" rx="12" fill="#E7ECE9"/>
  <text class="t mut" x="720" y="33" font-size="12" text-anchor="middle">127.0.0.1:8787 · 组织架构</text>
  <rect x="7" y="50" width="1426" height="843" fill="#F4F7F5"/>

  <!-- sidebar -->
  <g transform="translate(7,50)">
    <rect width="248" height="843" fill="#FBFCFC" stroke="#EAEFEC" stroke-width="1.5"/>
    <rect x="22" y="22" width="40" height="40" rx="11" class="grn"/>
    <text class="t" x="42" y="48" font-size="20" font-weight="800" fill="#fff" text-anchor="middle">本</text>
    <text class="t dk" x="74" y="40" font-size="15" font-weight="800">本地 Agent 工作台</text>
    <text class="t mut" x="74" y="57" font-size="10" letter-spacing="1">LOCAL AGENT HUB · v5.4</text>
    <text class="t mut" x="24" y="96" font-size="11" letter-spacing="2">导航</text>
    <g class="t sub" font-size="13.5">
      <text x="30" y="128">⌂  工作台</text><text x="30" y="162">✧  任务场景</text><text x="30" y="196">≣  运行记录</text><text x="30" y="230">▤  飞书文档</text><text x="30" y="264">▢  本地目录</text><text x="30" y="298">▦  历史总结</text>
    </g>
    <rect x="14" y="314" width="220" height="34" rx="9" fill="#E8F7EE"/>
    <text class="t grn" x="30" y="336" font-size="13.5" font-weight="700">⋔  组织架构</text>
    <text class="t mut" x="24" y="380" font-size="11" letter-spacing="2">AGENTS</text>
    <g class="t" font-size="13">
      <g><circle cx="30" cy="406" r="5" fill="#22C55E"/><text class="dk" x="46" y="410">HTML 页面生成</text></g>
      <g><circle cx="30" cy="436" r="5" fill="#3B82F6"/><text class="dk" x="46" y="440">文档地图</text></g>
      <g><circle cx="30" cy="466" r="5" fill="#EC4899"/><text class="dk" x="46" y="470">摘要标签回填</text></g>
      <g><circle cx="30" cy="496" r="5" fill="#F59E0B"/><text class="dk" x="46" y="500">知识治理</text></g>
      <g><circle cx="30" cy="526" r="5" fill="#EAB308"/><text class="dk" x="46" y="530">多维表格分析</text></g>
      <g><circle cx="30" cy="556" r="5" fill="#8B5CF6"/><text class="dk" x="46" y="560">PDF 识别</text></g>
      <g><circle cx="30" cy="586" r="5" fill="#F97316"/><text class="dk" x="46" y="590">会议纪要</text></g>
      <g><circle cx="30" cy="616" r="5" fill="#EF4444"/><text class="dk" x="46" y="620">协作分发</text></g>
      <g><circle cx="30" cy="646" r="5" fill="#0EA5E9"/><text class="dk" x="46" y="650">自动化提炼</text></g>
    </g>
  </g>

  <!-- main -->
  <g transform="translate(255,50)">
    <rect width="1178" height="52" fill="#FBFCFC" stroke="#EAEFEC" stroke-width="1.5"/>
    <text class="t sub" x="36" y="32" font-size="13.5">☰   工作台  ›  组织架构</text>
    <text class="t dk" x="36" y="96" font-size="24" font-weight="800">组织架构图谱</text>
    <text class="t sub" x="36" y="120" font-size="12.5">部门 42（显示 42） · 全员 320 · 一级部门 6　·　示例 / 虚构数据</text>
    <!-- right controls -->
    <rect x="800" y="74" width="200" height="32" rx="9" fill="#fff" stroke="#E0E6E2"/><text class="t mut" x="816" y="95" font-size="12">🔍 搜索部门…</text>
    <rect x="1010" y="74" width="70" height="32" rx="9" fill="#fff" stroke="#E0E6E2"/><text class="t sub" x="1045" y="95" font-size="12.5" text-anchor="middle">复位</text>
    <rect x="1088" y="74" width="90" height="32" rx="9" fill="#fff" stroke="#E0E6E2"/><text class="t sub" x="1133" y="95" font-size="12" text-anchor="middle">⟳ 重新拉取</text>

    <!-- ============ graph (center 650,430) ============ -->
    <!-- edges: center -> hubs -->
    <g stroke-width="2" fill="none" opacity="0.55">
      <line x1="650" y1="430" x2="650" y2="185" stroke="#14B8A6"/>
      <line x1="650" y1="430" x2="862" y2="300" stroke="#22C55E"/>
      <line x1="650" y1="430" x2="862" y2="560" stroke="#3B82F6"/>
      <line x1="650" y1="430" x2="650" y2="675" stroke="#F59E0B"/>
      <line x1="650" y1="430" x2="438" y2="560" stroke="#8B5CF6"/>
      <line x1="650" y1="430" x2="438" y2="300" stroke="#EC4899"/>
    </g>
    <!-- edges: hub -> leaves -->
    <g stroke-width="1.4" fill="none" opacity="0.4">
      <!-- 数据平台 (650,185) -->
      <line x1="650" y1="185" x2="560" y2="120" stroke="#14B8A6"/><line x1="650" y1="185" x2="650" y2="95" stroke="#14B8A6"/><line x1="650" y1="185" x2="742" y2="120" stroke="#14B8A6"/>
      <!-- 研发中心 (862,300) -->
      <line x1="862" y1="300" x2="945" y2="232" stroke="#22C55E"/><line x1="862" y1="300" x2="985" y2="300" stroke="#22C55E"/><line x1="862" y1="300" x2="948" y2="368" stroke="#22C55E"/>
      <!-- 产品部 (862,560) -->
      <line x1="862" y1="560" x2="948" y2="498" stroke="#3B82F6"/><line x1="862" y1="560" x2="985" y2="565" stroke="#3B82F6"/><line x1="862" y1="560" x2="945" y2="632" stroke="#3B82F6"/>
      <!-- 市场部 (650,675) -->
      <line x1="650" y1="675" x2="560" y2="748" stroke="#F59E0B"/><line x1="650" y1="675" x2="650" y2="768" stroke="#F59E0B"/><line x1="650" y1="675" x2="742" y2="748" stroke="#F59E0B"/>
      <!-- 运营中心 (438,560) -->
      <line x1="438" y1="560" x2="352" y2="498" stroke="#8B5CF6"/><line x1="438" y1="560" x2="315" y2="565" stroke="#8B5CF6"/><line x1="438" y1="560" x2="355" y2="632" stroke="#8B5CF6"/>
      <!-- 职能中台 (438,300) -->
      <line x1="438" y1="300" x2="355" y2="232" stroke="#EC4899"/><line x1="438" y1="300" x2="315" y2="300" stroke="#EC4899"/><line x1="438" y1="300" x2="352" y2="368" stroke="#EC4899"/>
    </g>

    <!-- leaves -->
    <g class="t" font-size="10" font-weight="700" text-anchor="middle">
      <!-- 数据平台 -->
      <circle cx="560" cy="120" r="13" fill="#14B8A6"/><text fill="#fff" x="560" y="124">6</text>
      <circle cx="650" cy="95" r="11" fill="none" stroke="#14B8A6" stroke-width="2" stroke-dasharray="3 2"/><text fill="#0F766E" x="650" y="99">4</text>
      <circle cx="742" cy="120" r="12" fill="#14B8A6"/><text fill="#fff" x="742" y="124">5</text>
      <!-- 研发中心 -->
      <circle cx="945" cy="232" r="15" fill="#22C55E"/><text fill="#fff" x="945" y="236">12</text>
      <circle cx="985" cy="300" r="12" fill="#22C55E"/><text fill="#fff" x="985" y="304">7</text>
      <circle cx="948" cy="368" r="16" fill="#22C55E"/><text fill="#fff" x="948" y="372">14</text>
      <!-- 产品部 -->
      <circle cx="948" cy="498" r="12" fill="#3B82F6"/><text fill="#fff" x="948" y="502">6</text>
      <circle cx="985" cy="565" r="11" fill="none" stroke="#3B82F6" stroke-width="2" stroke-dasharray="3 2"/><text fill="#1D4ED8" x="985" y="569">3</text>
      <circle cx="945" cy="632" r="13" fill="#3B82F6"/><text fill="#fff" x="945" y="636">8</text>
      <!-- 市场部 -->
      <circle cx="560" cy="748" r="12" fill="#F59E0B"/><text fill="#fff" x="560" y="752">6</text>
      <circle cx="650" cy="768" r="11" fill="#F59E0B"/><text fill="#fff" x="650" y="772">5</text>
      <circle cx="742" cy="748" r="10" fill="none" stroke="#F59E0B" stroke-width="2" stroke-dasharray="3 2"/><text fill="#B45309" x="742" y="752">2</text>
      <!-- 运营中心 -->
      <circle cx="352" cy="498" r="15" fill="#8B5CF6"/><text fill="#fff" x="352" y="502">11</text>
      <circle cx="315" cy="565" r="12" fill="#8B5CF6"/><text fill="#fff" x="315" y="569">7</text>
      <circle cx="355" cy="632" r="16" fill="#8B5CF6"/><text fill="#fff" x="355" y="636">16</text>
      <!-- 职能中台 -->
      <circle cx="355" cy="232" r="12" fill="#EC4899"/><text fill="#fff" x="355" y="236">7</text>
      <circle cx="315" cy="300" r="11" fill="none" stroke="#EC4899" stroke-width="2" stroke-dasharray="3 2"/><text fill="#BE185D" x="315" y="304">4</text>
      <circle cx="352" cy="368" r="13" fill="#EC4899"/><text fill="#fff" x="352" y="372">9</text>
    </g>

    <!-- hubs -->
    <g class="t">
      <circle cx="650" cy="185" r="27" fill="#14B8A6"/><text class="cnt" x="650" y="192" font-size="16">28</text><text class="lbl" x="650" y="232" font-size="13" text-anchor="middle">数据平台</text>
      <circle cx="862" cy="300" r="44" fill="#22C55E"/><text class="cnt" x="862" y="308" font-size="20">96</text><text class="lbl" x="862" y="360" font-size="13" text-anchor="middle">研发中心</text>
      <circle cx="862" cy="560" r="32" fill="#3B82F6"/><text class="cnt" x="862" y="567" font-size="17">42</text><text class="lbl" x="862" y="608" font-size="13" text-anchor="middle">产品部</text>
      <circle cx="650" cy="675" r="30" fill="#F59E0B"/><text class="cnt" x="650" y="682" font-size="16">38</text><text class="lbl" x="650" y="722" font-size="13" text-anchor="middle">市场部</text>
      <circle cx="438" cy="560" r="36" fill="#8B5CF6"/><text class="cnt" x="438" y="567" font-size="18">55</text><text class="lbl" x="438" y="612" font-size="13" text-anchor="middle">运营中心</text>
      <circle cx="438" cy="300" r="28" fill="#EC4899"/><text class="cnt" x="438" y="307" font-size="16">34</text><text class="lbl" x="438" y="344" font-size="13" text-anchor="middle">职能中台</text>
    </g>

    <!-- center -->
    <circle cx="650" cy="430" r="42" fill="#1F2430"/><text class="cnt" x="650" y="428" font-size="20">320</text><text x="650" y="450" font-size="11" fill="#C9D1D9" text-anchor="middle" class="t">全员</text>

    <!-- legend -->
    <g transform="translate(16,556)" class="t">
      <rect class="card" width="190" height="210" rx="12"/>
      <text class="mut" x="16" y="28" font-size="11" letter-spacing="1">一级部门</text>
      <g font-size="12.5">
        <circle cx="24" cy="52" r="6" fill="#22C55E"/><text class="dk" x="40" y="56">研发中心</text>
        <circle cx="24" cy="80" r="6" fill="#3B82F6"/><text class="dk" x="40" y="84">产品部</text>
        <circle cx="24" cy="108" r="6" fill="#F59E0B"/><text class="dk" x="40" y="112">市场部</text>
        <circle cx="24" cy="136" r="6" fill="#8B5CF6"/><text class="dk" x="40" y="140">运营中心</text>
        <circle cx="24" cy="164" r="6" fill="#EC4899"/><text class="dk" x="40" y="168">职能中台</text>
        <circle cx="24" cy="192" r="6" fill="#14B8A6"/><text class="dk" x="40" y="196">数据平台</text>
      </g>
    </g>

    <text class="t mut" x="36" y="812" font-size="11.5">示例 / 虚构组织架构 · 共 42 个部门 / 320 人 · 更新于 2026-01-15</text>
  </g>
</svg>
