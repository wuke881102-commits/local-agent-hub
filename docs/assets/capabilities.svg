<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="八个内置 Agent">
  <defs>
    <style>
      .t  { font-family:"Segoe UI","PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif; }
      .ti { font-weight:800; font-size:21px; fill:#0F2A1C; }
      .tag{ font-weight:800; font-size:12px; fill:#00AA4F; letter-spacing:1px; }
      .d  { font-size:14px; fill:#5B6B62; }
      .card { fill:#ffffff; stroke:#E3EAE5; stroke-width:1.5; }
      .ic  { fill:none; stroke:#00AA4F; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
    </style>
  </defs>
  <rect width="1200" height="500" rx="18" fill="#F6FAF7"/>

  <!-- row/col geometry: 4 cols (w270, gap24, x=24/318/612/906); 2 rows (y=24/258, h210) -->
  <!-- ============ A1 HTML 页面生成 ============ -->
  <g transform="translate(24,24)">
    <rect class="card" width="270" height="210" rx="16"/>
    <rect x="24" y="24" width="52" height="52" rx="13" fill="#E8F7EE"/>
    <g transform="translate(38,38) scale(1.05)"><path class="ic" d="M4 4h16v5H4zM4 13h7v7H4zM15 13h5v7h-5z"/></g>
    <text class="t tag" x="24" y="112">A1</text>
    <text class="t ti"  x="24" y="138">HTML 页面生成</text>
    <text class="t d"   x="24" y="166"><tspan x="24">飞书文档 / Word / HTML →</tspan><tspan x="24" dy="20">套 Lumen-light 设计系统的企业页面</tspan></text>
  </g>
  <!-- ============ A2 文档地图 ============ -->
  <g transform="translate(318,24)">
    <rect class="card" width="270" height="210" rx="16"/>
    <rect x="24" y="24" width="52" height="52" rx="13" fill="#E8F7EE"/>
    <g transform="translate(38,38) scale(1.05)"><path class="ic" d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2zM9 4v14M15 6v14"/></g>
    <text class="t tag" x="24" y="112">A2</text>
    <text class="t ti"  x="24" y="138">文档地图</text>
    <text class="t d"   x="24" y="166"><tspan x="24">列出可访问的文档与表格，</tspan><tspan x="24" dy="20">按类型、归属、重复情况归类</tspan></text>
  </g>
  <!-- ============ A3 摘要标签回填 ============ -->
  <g transform="translate(612,24)">
    <rect class="card" width="270" height="210" rx="16"/>
    <rect x="24" y="24" width="52" height="52" rx="13" fill="#E8F7EE"/>
    <g transform="translate(38,38) scale(1.05)"><path class="ic" d="M20 10.5 13.5 4H6a2 2 0 0 0-2 2v7.5L10.5 20a2 2 0 0 0 2.8 0l6.7-6.7a2 2 0 0 0 0-2.8z"/><circle class="ic" cx="8.5" cy="8.5" r="1.2"/></g>
    <text class="t tag" x="24" y="112">A3</text>
    <text class="t ti"  x="24" y="138">摘要标签回填</text>
    <text class="t d"   x="24" y="166"><tspan x="24">为文档批量生成摘要与标签，</tspan><tspan x="24" dy="20">写入本地索引，也可写回飞书</tspan></text>
  </g>
  <!-- ============ A4 知识治理 ============ -->
  <g transform="translate(906,24)">
    <rect class="card" width="270" height="210" rx="16"/>
    <rect x="24" y="24" width="52" height="52" rx="13" fill="#E8F7EE"/>
    <g transform="translate(38,38) scale(1.05)"><path class="ic" d="m12 3 1.8 4.2L18 9l-4.2 1.8L12 15l-1.8-4.2L6 9l4.2-1.8z"/><path class="ic" d="m18.5 14 .9 2 2 .9-2 .9-.9 2-.9-2-2-.9 2-.9z"/></g>
    <text class="t tag" x="24" y="112">A4</text>
    <text class="t ti"  x="24" y="138">知识治理</text>
    <text class="t d"   x="24" y="166"><tspan x="24">找出重复、过期、缺负责人的</tspan><tspan x="24" dy="20">文档，并给出处理建议</tspan></text>
  </g>

  <!-- ============ A5 多维表格分析 ============ -->
  <g transform="translate(24,258)">
    <rect class="card" width="270" height="210" rx="16"/>
    <rect x="24" y="24" width="52" height="52" rx="13" fill="#E8F7EE"/>
    <g transform="translate(38,38) scale(1.05)"><rect class="ic" x="3" y="4" width="18" height="16" rx="2"/><path class="ic" d="M3 9h18M3 14h18M9 4v16M15 4v16"/></g>
    <text class="t tag" x="24" y="112">A5</text>
    <text class="t ti"  x="24" y="138">多维表格分析</text>
    <text class="t d"   x="24" y="166"><tspan x="24">数据归纳并出图：柱状 / 饼 /</tspan><tspan x="24" dy="20">折线 / 甘特 / 架构图，可下载</tspan></text>
  </g>
  <!-- ============ A6 PDF 识别 ============ -->
  <g transform="translate(318,258)">
    <rect class="card" width="270" height="210" rx="16"/>
    <rect x="24" y="24" width="52" height="52" rx="13" fill="#E8F7EE"/>
    <g transform="translate(38,38) scale(1.05)"><path class="ic" d="M3 7V4h3M21 7V4h-3M3 17v3h3M21 17v3h-3M7 12h10"/></g>
    <text class="t tag" x="24" y="112">A6</text>
    <text class="t ti"  x="24" y="138">PDF 识别</text>
    <text class="t d"   x="24" y="166"><tspan x="24">云盘 PDF 全文 / 字段 / 表格，</tspan><tspan x="24" dy="20">支持逐页识别与合同金额测算</tspan></text>
  </g>
  <!-- ============ A7 会议纪要 ============ -->
  <g transform="translate(612,258)">
    <rect class="card" width="270" height="210" rx="16"/>
    <rect x="24" y="24" width="52" height="52" rx="13" fill="#E8F7EE"/>
    <g transform="translate(38,38) scale(1.05)"><rect class="ic" x="9" y="3" width="6" height="11" rx="3"/><path class="ic" d="M5 11a7 7 0 0 0 14 0M12 18v3"/></g>
    <text class="t tag" x="24" y="112">A7</text>
    <text class="t ti"  x="24" y="138">会议纪要</text>
    <text class="t d"   x="24" y="166"><tspan x="24">妙记 / 会议记录 → 摘要、</tspan><tspan x="24" dy="20">决策、待办和风险点</tspan></text>
  </g>
  <!-- ============ A8 协作分发 ============ -->
  <g transform="translate(906,258)">
    <rect class="card" width="270" height="210" rx="16"/>
    <rect x="24" y="24" width="52" height="52" rx="13" fill="#E8F7EE"/>
    <g transform="translate(38,38) scale(1.05)"><path class="ic" d="M21 3 10 14M21 3l-7 18-4-7-7-4z"/></g>
    <text class="t tag" x="24" y="112">A8</text>
    <text class="t ti"  x="24" y="138">协作分发</text>
    <text class="t d"   x="24" y="166"><tspan x="24">生成消息 / 邮件 / 任务 / 日程</tspan><tspan x="24" dy="20">草稿，确认后再发送</tspan></text>
  </g>
</svg>
