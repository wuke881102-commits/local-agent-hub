<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" role="img" aria-label="历史总结 (示例数据)">
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0E7A43"/><stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
    <style>
      .t{font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
      .mut{fill:#8A968F} .dk{fill:#0F2A1C} .sub{fill:#5B6B62} .grn{fill:#00AA4F}
      .card{fill:#fff;stroke:#E6EBE8;stroke-width:1.5}
    </style>
  </defs>
  <rect x="6" y="6" width="1428" height="888" rx="16" fill="#fff" stroke="#DDE3DF" stroke-width="1.5"/>
  <rect x="6" y="6" width="1428" height="44" rx="16" fill="#F3F6F4"/><rect x="6" y="34" width="1428" height="16" fill="#F3F6F4"/>
  <g><circle cx="34" cy="28" r="6" fill="#FF5F57"/><circle cx="56" cy="28" r="6" fill="#FEBC2E"/><circle cx="78" cy="28" r="6" fill="#28C840"/></g>
  <rect x="520" y="17" width="400" height="24" rx="12" fill="#E7ECE9"/>
  <text class="t mut" x="720" y="33" font-size="12" text-anchor="middle">127.0.0.1:8787 · 历史总结</text>
  <rect x="7" y="50" width="1426" height="843" fill="#F4F7F5"/>

  <!-- sidebar -->
  <g transform="translate(7,50)">
    <rect width="248" height="843" fill="#FBFCFC" stroke="#EAEFEC" stroke-width="1.5"/>
    <rect x="22" y="22" width="40" height="40" rx="11" class="grn"/>
    <text class="t" x="42" y="48" font-size="20" font-weight="800" fill="#fff" text-anchor="middle">本</text>
    <text class="t dk" x="74" y="40" font-size="15" font-weight="800">本地 Agent 工作台</text>
    <text class="t mut" x="74" y="57" font-size="10" letter-spacing="1">LOCAL AGENT HUB · v5.4</text>
    <text class="t mut" x="24" y="96" font-size="11" letter-spacing="2">导航</text>
    <g class="t sub" font-size="13.5">
      <text x="30" y="128">⌂  工作台</text><text x="30" y="162">✧  任务场景</text><text x="30" y="196">≣  运行记录</text><text x="30" y="230">▤  飞书文档</text><text x="30" y="264">▢  本地目录</text>
    </g>
    <rect x="14" y="280" width="220" height="34" rx="9" fill="#E8F7EE"/>
    <text class="t grn" x="30" y="302" font-size="13.5" font-weight="700">▦  历史总结</text>
    <g class="t sub" font-size="13.5"><text x="30" y="340">⋔  组织架构</text></g>
    <text class="t mut" x="24" y="380" font-size="11" letter-spacing="2">AGENTS</text>
    <g class="t" font-size="13">
      <g><circle cx="30" cy="406" r="5" fill="#22C55E"/><text class="dk" x="46" y="410">HTML 页面生成</text></g>
      <g><circle cx="30" cy="436" r="5" fill="#3B82F6"/><text class="dk" x="46" y="440">文档地图</text></g>
      <g><circle cx="30" cy="466" r="5" fill="#EC4899"/><text class="dk" x="46" y="470">摘要标签回填</text></g>
      <g><circle cx="30" cy="496" r="5" fill="#F59E0B"/><text class="dk" x="46" y="500">知识治理</text></g>
      <g><circle cx="30" cy="526" r="5" fill="#EAB308"/><text class="dk" x="46" y="530">多维表格分析</text></g>
      <g><circle cx="30" cy="556" r="5" fill="#8B5CF6"/><text class="dk" x="46" y="560">PDF 识别</text></g>
      <g><circle cx="30" cy="586" r="5" fill="#F97316"/><text class="dk" x="46" y="590">会议纪要</text></g>
      <g><circle cx="30" cy="616" r="5" fill="#EF4444"/><text class="dk" x="46" y="620">协作分发</text></g>
      <g><circle cx="30" cy="646" r="5" fill="#0EA5E9"/><text class="dk" x="46" y="650">自动化提炼</text></g>
    </g>
  </g>

  <!-- main -->
  <g transform="translate(255,50)">
    <rect width="1178" height="52" fill="#FBFCFC" stroke="#EAEFEC" stroke-width="1.5"/>
    <text class="t sub" x="36" y="32" font-size="13.5">☰   工作台  ›  历史总结</text>

    <!-- hero -->
    <g transform="translate(36,72)">
      <rect width="1106" height="132" rx="16" fill="url(#hero)"/>
      <text class="t" x="30" y="44" font-size="12.5" fill="#CDEFD9" letter-spacing="1">时间轴回顾</text>
      <text class="t" x="30" y="88" font-size="30" font-weight="800" fill="#fff">👋 你已与飞书同行 <tspan font-size="34">365</tspan> 天</text>
      <text class="t" x="30" y="116" font-size="13" fill="#DBF3E4">从 2024-01-15 的第一个文档《示例入职指南》开始</text>
    </g>

    <!-- period toggle -->
    <g transform="translate(36,224)" class="t">
      <rect x="0" y="0" width="180" height="34" rx="9" fill="#EEF2F0"/>
      <rect x="4" y="4" width="56" height="26" rx="7" fill="#fff" stroke="#E0E6E2"/><text class="dk" x="32" y="22" font-size="12.5" font-weight="700" text-anchor="middle">本周</text>
      <text class="sub" x="90" y="22" font-size="12.5" text-anchor="middle">本月</text>
      <text class="sub" x="150" y="22" font-size="12.5" text-anchor="middle">本年</text>
      <text class="dk" x="1106" y="16" font-size="15" font-weight="800" text-anchor="end">2026 年第 27 周</text>
      <text class="mut" x="1106" y="34" font-size="11.5" text-anchor="end">2026-06-29 ~ 2026-07-05</text>
      <text class="mut" x="0" y="58" font-size="12">⟳ 数据截至 2026-07-01 · 点此刷新</text>
    </g>

    <!-- metric cards (6) -->
    <g transform="translate(36,300)" class="t">
      <!-- w172 h96 gap15 -->
      <g><rect class="card" width="172" height="96" rx="14"/><text class="dk" x="24" y="56" font-size="34" font-weight="800">12</text><text class="mut" x="24" y="80" font-size="12">动过文档</text></g>
      <g transform="translate(187,0)"><rect class="card" width="172" height="96" rx="14"/><text class="dk" x="24" y="56" font-size="34" font-weight="800">4</text><text class="mut" x="24" y="80" font-size="12">新建</text></g>
      <g transform="translate(374,0)"><rect class="card" width="172" height="96" rx="14"/><text class="dk" x="24" y="56" font-size="34" font-weight="800">2</text><text class="mut" x="24" y="80" font-size="12">会议纪要</text></g>
      <g transform="translate(561,0)"><rect class="card" width="172" height="96" rx="14"/><text class="mut" x="24" y="56" font-size="34" font-weight="800">0</text><text class="mut" x="24" y="80" font-size="12">合同</text></g>
      <g transform="translate(748,0)"><rect class="card" width="172" height="96" rx="14"/><text class="dk" x="24" y="56" font-size="34" font-weight="800">3</text><text class="mut" x="24" y="80" font-size="12">涉及空间</text></g>
      <g transform="translate(935,0)"><rect class="card" width="172" height="96" rx="14"/><text class="dk" x="24" y="56" font-size="34" font-weight="800">2</text><text class="mut" x="24" y="80" font-size="12">本地文件</text></g>
    </g>

    <!-- 本期回顾 -->
    <g transform="translate(36,412)" class="t">
      <rect class="card" width="1106" height="92" rx="14"/>
      <text class="dk" x="24" y="40" font-size="14" font-weight="800">● 本期回顾  <tspan class="mut" font-weight="400" font-size="12">AI · 快档</tspan></text>
      <text class="sub" x="24" y="68" font-size="12.5">点「生成回顾」让 AI 基于本期动过的 12 篇文档与 2 个本地文件，写一段工作回顾并挑出重点。（只读标题与摘要，秒级返回）</text>
      <rect x="944" y="26" width="138" height="34" rx="9" fill="#E8F7EE"/><text class="grn" x="1013" y="48" font-size="12.5" font-weight="700" text-anchor="middle">✧ 生成回顾</text>
    </g>

    <!-- 按主题 bar chart -->
    <g transform="translate(36,516)" class="t">
      <rect class="card" width="1106" height="276" rx="14"/>
      <text class="dk" x="24" y="40" font-size="15" font-weight="800">按主题</text>
      <!-- bars: label at x120, bar from x140, max width ~840 for count 7 -->
      <g font-size="12.5">
        <text class="sub" x="112" y="76" text-anchor="end">未分类</text>
        <rect x="130" y="64" width="900" height="16" rx="8" fill="#EEF3F0"/><rect x="130" y="64" width="900" height="16" rx="8" fill="#10B981"/><text class="dk" x="1044" y="77">6</text>
        <text class="sub" x="112" y="108" text-anchor="end">产品需求</text>
        <rect x="130" y="96" width="900" height="16" rx="8" fill="#EEF3F0"/><rect x="130" y="96" width="600" height="16" rx="8" fill="#3B82F6"/><text class="dk" x="1044" y="109">4</text>
        <text class="sub" x="112" y="140" text-anchor="end">项目管理</text>
        <rect x="130" y="128" width="900" height="16" rx="8" fill="#EEF3F0"/><rect x="130" y="128" width="450" height="16" rx="8" fill="#F59E0B"/><text class="dk" x="1044" y="141">3</text>
        <text class="sub" x="112" y="172" text-anchor="end">本地文件</text>
        <rect x="130" y="160" width="900" height="16" rx="8" fill="#EEF3F0"/><rect x="130" y="160" width="300" height="16" rx="8" fill="#8B5CF6"/><text class="dk" x="1044" y="173">2</text>
        <text class="sub" x="112" y="204" text-anchor="end">技术文档</text>
        <rect x="130" y="192" width="900" height="16" rx="8" fill="#EEF3F0"/><rect x="130" y="192" width="150" height="16" rx="8" fill="#14B8A6"/><text class="dk" x="1044" y="205">1</text>
        <text class="sub" x="112" y="236" text-anchor="end">会议纪要</text>
        <rect x="130" y="224" width="900" height="16" rx="8" fill="#EEF3F0"/><rect x="130" y="224" width="150" height="16" rx="8" fill="#EAB308"/><text class="dk" x="1044" y="237">1</text>
      </g>
    </g>
  </g>
</svg>
